<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Fontawesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        body {
            background-color: #F8FAFC;
        }
    </style>


</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row justify-between items-center px-11">
            <div class="flex items-center">
                <a class="btn btn-ghost text-xl"><img class="size-8" src="assets/github-logo.png" alt=""></a>
                <p class="text-2xl text-[#1F2937] font-semibold">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">

                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" class="rounded-sm" required placeholder="Search Issues...." />
                </label>
                <button id="search-btn" class="btn btn-primary">Search</button> 
<!-- + New Issue -->
            </div>
        </div>
    </header>
    <hr class="opacity-5">

    <section id="main" class="w-10/12 mx-auto  my-14">
        <div id="filter" class="shadow-sm p-6 rounded-md space-x-2 bg-white flex justify-center lg:justify-start">
            <button onclick="toggleButton(`toggle-all`)" id="toggle-all"
                class="toggle-btn w-[120px] btn btn-white">All</button>
            <button onclick="toggleButton(`toggle-open`)" id="toggle-open"
                class="toggle-btn w-[120px] btn btn-white">Open</button>
            <button onclick="toggleButton(`toggle-close`)" id="toggle-close"
                class="toggle-btn w-[120px] btn btn-white">Closed</button>
        </div>
        <div id="All-issue" class="my-6  ">
            <div id="all-status" class="flex justify-between items-center p-5 shadow-sm p-2 bg-white rounded-md">
                <div class="flex items-center gap-4">
                    <img class="bg-purple-200 rounded-full p-2 size-12" src="assets/Aperture.png" alt="">
                    <div class="">
                        <h2 id="issues" class="text-2xl font-semibold">3 Issues</h2>
                        <p class="text-gray-500 ">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="flex items-center gap-1">
                        <img class="size-2" src="assets/Ellipse 2.png" alt="">
                        <p> open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <img class="size-2" src="assets/Ellipse 1.png" alt="">
                        <p> Closed</p>
                    </div>

                </div>
            </div>

            <!-- Spin -->
             <div id="spinner" class="flex justify-center items-center  mt-12 hidden">
                <span class="loading loading-spinner loading-xl"></span>
             </div>
             



            <!-- All cards -->
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4  py-6 px-4 gap-4 ">


            </div>
        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->

    <dialog id="details_modal" class="modal">
        <div class="modal-box">

            <div id="details-container" class="">

            </div>


            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script/home.js"></script>
</body>


</html>
